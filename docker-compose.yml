# ──────────────────────────────────────────────────────────────────────────
# Niveshaay Financial Results Pipeline
#
#   n8n           — the whole app: serves the UI (GET /webhook/ui) AND the JSON API
#                   (POST /webhook/process-pdf). Stock image; no Chromium needed
#                   (the P&L image is rendered in-browser). Port 5678.
#   evolution     — OPTIONAL WhatsApp gateway (only if you add WhatsApp delivery). 8080.
#   postgres      — datastore for Evolution. 5434. Optional.
#   redis         — cache for Evolution (required by Evolution v2). Optional.
#   image-service — OPTIONAL Puppeteer PNG renderer for the WhatsApp branch. 3001.
#
# Easiest:    ./setup.sh                 (brings everything up + imports the workflow)
# Core only:  docker compose up -d n8n   (then import + activate workflow.json)
# WhatsApp:   docker compose --profile whatsapp up -d   (postgres+redis+evolution+image-service+n8n)
# ──────────────────────────────────────────────────────────────────────────
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: niveshaay_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_RUNNERS_ENABLED=true
      - GENERIC_TIMEZONE=Asia/Kolkata
      # REQUIRED: allow {{ $env.GEMINI_API_KEY }} in node expressions.
      # n8n blocks env access in nodes by default; without this the Gemini node
      # fails with "access to env vars denied".
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflow.json:/workflow.json:ro   # used by setup.sh to import the workflow

  # ── Optional: WhatsApp delivery via Evolution API ──────────────────────────
  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: niveshaay_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-change-me}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution123@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      # Redis cache — REQUIRED. Without it Evolution v2 crash-loops on "redis disconnected".
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/8
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=true
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1040549582
    depends_on:
      - postgres
      - redis
    profiles: ["whatsapp"]

  redis:
    image: redis:7-alpine
    container_name: niveshaay_redis
    restart: unless-stopped
    volumes:
      - evolution_redis:/data
    profiles: ["whatsapp"]

  postgres:
    image: postgres:15-alpine
    container_name: niveshaay_postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution123
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    profiles: ["whatsapp"]

  # ── Optional: Puppeteer PNG renderer for the WhatsApp branch ───────────────
  # n8n's "Render Image" node POSTs the P&L JSON to http://image-service:3001
  # /generate-image and gets back { base64 } (the styled green PNG).
  image-service:
    build: ./image-service
    container_name: niveshaay_image_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    profiles: ["whatsapp"]

volumes:
  n8n_data:
  evolution_pgdata:
  evolution_redis:
